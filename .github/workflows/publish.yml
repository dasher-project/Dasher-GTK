name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Flatpak ──────────────────────────────────────────────────────────
  flatpak:
    name: Flatpak
    # 24.04 ships flatpak-builder 1.4+, which drives appstream via
    # `appstreamcli compose` (present in GNOME SDK 48). 22.04's 1.2.x calls
    # the old `appstream-compose`, which the SDK no longer provides.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --noninteractive \
            flathub org.gnome.Sdk//48 org.gnome.Platform//48 \
                   org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build Flatpak
        run: |
          git config --global protocol.file.allow always
          # Run outside the repo so the manifest's `type: dir` source (repo
          # root) doesn't recursively copy flatpak-builder's own build/state
          # dirs. Source paths in the manifest resolve relative to the manifest.
          mkdir -p "$RUNNER_TEMP/fb" && cd "$RUNNER_TEMP/fb"
          flatpak-builder --user --install --force-clean \
            build \
            "$GITHUB_WORKSPACE/packaging/flatpak/org.alternativeinterface.dasher.yaml"

      - name: Export bundle
        run: |
          flatpak build-bundle ~/.local/share/flatpak/repo \
            Dasher.flatpak org.alternativeinterface.dasher

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: Dasher-flatpak
          path: Dasher.flatpak

  # ─── AppImage ─────────────────────────────────────────────────────────
  appimage:
    name: AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GTK4
        uses: PapeCoding/Install-GTK@main
        with:
          linux-release: 'libgtk-4-dev libgtkmm-4.0-dev'

      - name: Install extra build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libspeechd-dev libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build AppImage
        run: VERSION=${GITHUB_REF_NAME:-0.1.0} bash packaging/build-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Dasher-AppImage
          path: Dasher-x86_64.AppImage

  # ─── GitHub Release (tags only) ───────────────────────────────────────
  release:
    name: GitHub Release
    needs: [flatpak, appimage]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Dasher-flatpak
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: Dasher-AppImage
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/Dasher.flatpak
            release/Dasher-x86_64.AppImage
