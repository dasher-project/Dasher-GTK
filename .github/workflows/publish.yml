name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Flatpak ──────────────────────────────────────────────────────────
  flatpak:
    name: Flatpak
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-github-actions@v6.4
        with:
          bundle: Dasher.flatpak
          manifest-path: packaging/flatpak/org.alternativeinterface.dasher.yaml

  # ─── AppImage ─────────────────────────────────────────────────────────
  appimage:
    name: AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config ninja-build \
            libgtk-4-dev libgtkmm-4.0-dev \
            libspeechd-dev libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build AppImage
        run: VERSION=${GITHUB_REF_NAME:-0.1.0} bash packaging/build-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Dasher-AppImage
          path: Dasher-x86_64.AppImage

  # ─── GitHub Release (tags only) ───────────────────────────────────────
  release:
    name: GitHub Release
    needs: [flatpak, appimage]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Dasher-flatpak
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: Dasher-AppImage
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/Dasher.flatpak
            release/Dasher-x86_64.AppImage
