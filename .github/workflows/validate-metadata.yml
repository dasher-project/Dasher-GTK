name: Validate packaging metadata

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: sudo apt-get update && sudo apt-get install -y desktop-file-utils appstream

      - name: Validate desktop entry
        run: desktop-file-validate packaging/org.alternativeinterface.dasher.desktop

      - name: Validate AppStream metainfo
        run: appstreamcli validate --no-net packaging/org.alternativeinterface.dasher.metainfo.xml
