---
app-id: org.alternativeinterface.dasher
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: dasher

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=all
  - --talk-name=org.a11y.Bus
  - --talk-name=org.a11y.*
  - --filesystem=home

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - /share/man
  - /share/gtk-doc
  - /share/doc
  - '*.la'
  - '*.a'

modules:
  # ─── C++ binding chain for gtkmm ──────────────────────────────────────
  - name: mm-common
    buildsystem: meson
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://download.gnome.org/sources/mm-common/1.0/mm-common-1.0.7.tar.xz
        sha256: 494abfce781418259b1e9d8888c73af4de4b6f3be36cc75d9baa8baa0f2a7a39

  - name: libsigc++
    buildsystem: meson
    config-opts:
      - -Dbuild-examples=false
      - -Dbuild-tests=false
    cleanup:
      - /lib/sigc++-3.0
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsigc++/3.6/libsigc++-3.6.0.tar.xz
        sha256: c3d23b37dfd6e39f2e09f091b77b1541fbfa17c4f0b6bf5c89baef7229080e17

  - name: glibmm
    buildsystem: meson
    config-opts:
      - --wrap-mode=nodownload
    sources:
      - type: archive
        url: https://download.gnome.org/sources/glibmm/2.84/glibmm-2.84.0.tar.xz
        sha256: 56ee5f51c8acfc0afdf46959316e4c8554cb50ed2b6bc5ce389d979cbb642509
      - type: archive
        url: https://download.gnome.org/sources/libsigc++/3.6/libsigc++-3.6.0.tar.xz
        sha256: c3d23b37dfd6e39f2e09f091b77b1541fbfa17c4f0b6bf5c89baef7229080e17
        dest: subprojects/libsigcplusplus

  - name: cairomm
    buildsystem: meson
    config-opts:
      - --wrap-mode=nodownload
    sources:
      - type: archive
        url: https://www.cairographics.org/releases/cairomm-1.18.0.tar.xz
        sha256: b81255394e3ea8e8aa887276d22afa8985fc8daef60692eb2407d23049f03cfb
      - type: archive
        url: https://download.gnome.org/sources/libsigc++/3.6/libsigc++-3.6.0.tar.xz
        sha256: c3d23b37dfd6e39f2e09f091b77b1541fbfa17c4f0b6bf5c89baef7229080e17
        dest: subprojects/libsigcplusplus

  - name: pangomm
    buildsystem: meson
    config-opts:
      - --wrap-mode=nodownload
    sources:
      - type: archive
        url: https://download.gnome.org/sources/pangomm/2.54/pangomm-2.54.0.tar.xz
        sha256: 4a5b1fd1b7c47a1af45277ea82b5abeaca8e08fb10a27daa6394cf88d74e7acf
      - type: archive
        url: https://download.gnome.org/sources/libsigc++/3.6/libsigc++-3.6.0.tar.xz
        sha256: c3d23b37dfd6e39f2e09f091b77b1541fbfa17c4f0b6bf5c89baef7229080e17
        dest: subprojects/libsigcplusplus
      - type: archive
        url: https://www.cairographics.org/releases/cairomm-1.18.0.tar.xz
        sha256: b81255394e3ea8e8aa887276d22afa8985fc8daef60692eb2407d23049f03cfb
        dest: subprojects/cairomm
      - type: archive
        url: https://download.gnome.org/sources/glibmm/2.84/glibmm-2.84.0.tar.xz
        sha256: 56ee5f51c8acfc0afdf46959316e4c8554cb50ed2b6bc5ce389d979cbb642509
        dest: subprojects/glibmm

  - name: gtkmm
    buildsystem: meson
    config-opts:
      - --wrap-mode=nodownload
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gtkmm/4.16/gtkmm-4.16.0.tar.xz
        sha256: 3b23fd3abf8fb223b00e9983b6010af2db80e38c89ab6994b8b6230aa85d60f9
      - type: archive
        url: https://download.gnome.org/sources/libsigc++/3.6/libsigc++-3.6.0.tar.xz
        sha256: c3d23b37dfd6e39f2e09f091b77b1541fbfa17c4f0b6bf5c89baef7229080e17
        dest: subprojects/libsigcplusplus
      - type: archive
        url: https://www.cairographics.org/releases/cairomm-1.18.0.tar.xz
        sha256: b81255394e3ea8e8aa887276d22afa8985fc8daef60692eb2407d23049f03cfb
        dest: subprojects/cairomm
      - type: archive
        url: https://download.gnome.org/sources/glibmm/2.84/glibmm-2.84.0.tar.xz
        sha256: 56ee5f51c8acfc0afdf46959316e4c8554cb50ed2b6bc5ce389d979cbb642509
        dest: subprojects/glibmm
      - type: archive
        url: https://download.gnome.org/sources/pangomm/2.54/pangomm-2.54.0.tar.xz
        sha256: 4a5b1fd1b7c47a1af45277ea82b5abeaca8e08fb10a27daa6394cf88d74e7acf
        dest: subprojects/pangomm

  # ─── Dasher-GTK (builds DasherCore + SDL3 + TTS + app together) ───────
  # Note: Flatpak uses cloud-only TTS (no speech-dispatcher) to avoid
  # building dotconf/libspeechd in the sandbox. AppImage has full system TTS.
  - name: dasher
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/dasher/cargo
        PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/lib/x86_64-linux-gnu/pkgconfig:/app/share/pkgconfig
    build-commands:
      # Diagnostic: find where gtkmm .pc files landed
      - find /app -name '*.pc' -path '*/pkgconfig/*' 2>/dev/null | head -30 || true
      - find /app -name 'gtkmm*' -type f 2>/dev/null | head -20 || true
      - cmake -B _build -DCMAKE_BUILD_TYPE=Release -DTTS_WRAPPER_FEATURES=cloud -DCMAKE_INSTALL_PREFIX=/app .
      - cmake --build _build -j$(nproc)
      - cmake --install _build
    post-install:
      - install -Dm644 ../packaging/org.alternativeinterface.dasher.desktop /app/share/applications/org.alternativeinterface.dasher.desktop
      - install -Dm644 ../packaging/org.alternativeinterface.dasher.metainfo.xml /app/share/metainfo/org.alternativeinterface.dasher.metainfo.xml
      - install -Dm644 ../Resources/icon.png /app/share/icons/hicolor/48x48/apps/org.alternativeinterface.dasher.png
      - install -Dm644 ../DasherCore/Data/dasher.svg /app/share/icons/hicolor/scalable/apps/org.alternativeinterface.dasher.svg
    sources:
      - type: git
        url: https://github.com/dasher-project/Dasher-GTK.git
        branch: main
      # Remove empty submodule dirs and .gitmodules so git doesn't
      # try to re-init submodules when the separate git sources clone
      - type: shell
        commands:
          - rm -rf DasherCore Thirdparty rust-tts-wrapper .gitmodules .git
      - type: git
        url: https://github.com/dasher-project/DasherCore.git
        branch: main
        dest: DasherCore
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        tag: release-3.2.16
        dest: Thirdparty/SDL
      - type: git
        url: https://github.com/AACTools/rust-tts-wrapper.git
        branch: main
        dest: rust-tts-wrapper
